name: Sync Upstream Release Tag

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_run:
    workflows: [Auto Sync Upstream Master]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Specific upstream tag to release, for example v3.15.159
        required: false
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: sync-upstream-release-tag
  cancel-in-progress: false

jobs:
  sync:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch origin and upstream refs
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/electerm/electerm.git
          git fetch origin master --no-tags --force
          git fetch upstream master --no-tags --force
          git fetch upstream --no-tags --prune '+refs/tags/*:refs/tags/upstream/*' --force

      - name: Resolve target upstream tag
        id: target
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        run: |
          if [ -n "$REQUESTED_TAG" ]; then
            TARGET_TAG="$REQUESTED_TAG"
          else
            TARGET_TAG="$(
              git for-each-ref refs/tags/upstream --format='%(refname:strip=3)' |
              grep -E '^v[0-9]+(\.[0-9]+)+$' |
              sort -V |
              tail -n 1
            )"
          fi

          if [ -z "$TARGET_TAG" ]; then
            echo "No upstream release tag found" >&2
            exit 1
          fi

          TARGET_REF="refs/tags/upstream/$TARGET_TAG"
          if ! TARGET_SHA="$(git rev-parse "$TARGET_REF^{commit}" 2>/dev/null)"; then
            echo "Unknown upstream tag: $TARGET_TAG" >&2
            exit 1
          fi

          FORK_TAG="${TARGET_TAG}-kokawu.1"
          {
            echo "tag=$TARGET_TAG"
            echo "sha=$TARGET_SHA"
            echo "fork_tag=$FORK_TAG"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Release Target"
            echo ""
            echo "- Upstream tag: \`$TARGET_TAG\`"
            echo "- Upstream commit: \`$TARGET_SHA\`"
            echo "- Fork tag: \`$FORK_TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify master contains the upstream release
        run: |
          if git merge-base --is-ancestor "${{ steps.target.outputs.sha }}" origin/master; then
            exit 0
          fi

          {
            echo ""
            echo "Cannot create the release because \`master\` does not contain \`${{ steps.target.outputs.tag }}\`."
            echo "The next successful upstream master sync will retry automatically."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Create fork release tag
        id: fork_tag
        env:
          FORK_TAG: ${{ steps.target.outputs.fork_tag }}
          TARGET_TAG: ${{ steps.target.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$FORK_TAG" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Fork tag already exists: $FORK_TAG"
            exit 0
          fi

          git checkout --detach origin/master
          git tag -a "$FORK_TAG" -m "electerm $TARGET_TAG with OSC52"
          git push origin "refs/tags/$FORK_TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Check for an existing GitHub Release
        id: release
        env:
          FORK_TAG: ${{ steps.target.outputs.fork_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$FORK_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build OSC52 package and create Release
        if: steps.release.outputs.exists != 'true'
        env:
          FORK_TAG: ${{ steps.target.outputs.fork_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build-win-osc52.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$FORK_TAG"

          {
            echo ""
            echo "Created \`$FORK_TAG\` and dispatched the OSC52 Windows release build."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report existing Release
        if: steps.release.outputs.exists == 'true'
        run: |
          {
            echo ""
            echo "Release \`${{ steps.target.outputs.fork_tag }}\` already exists. No build was dispatched."
          } >> "$GITHUB_STEP_SUMMARY"
