name: Release Latest OSC52 Build

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_run:
    workflows: [Auto Sync Upstream Master]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: sync-upstream-release-tag
  cancel-in-progress: false

jobs:
  sync:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch origin master
        run: |
          git fetch origin master --no-tags --force

      - name: Resolve release version
        id: target
        run: |
          APP_VERSION="$(
            git show origin/master:package.json |
            node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version"
          )"

          if ! [[ "$APP_VERSION" =~ ^[0-9]+(\.[0-9]+)+$ ]]; then
            echo "Invalid package version: $APP_VERSION" >&2
            exit 1
          fi

          MASTER_SHA="$(git rev-parse origin/master)"
          FORK_TAG="v${APP_VERSION}-kokawu.1"
          {
            echo "version=$APP_VERSION"
            echo "sha=$MASTER_SHA"
            echo "fork_tag=$FORK_TAG"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Release Target"
            echo ""
            echo "- Application version: \`$APP_VERSION\`"
            echo "- Master commit: \`$MASTER_SHA\`"
            echo "- Release tag: \`$FORK_TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create fork release tag
        id: fork_tag
        env:
          FORK_TAG: ${{ steps.target.outputs.fork_tag }}
          APP_VERSION: ${{ steps.target.outputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$FORK_TAG" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Fork tag already exists: $FORK_TAG"
            exit 0
          fi

          git checkout --detach origin/master
          git tag -a "$FORK_TAG" -m "electerm $APP_VERSION with OSC52"
          git push origin "refs/tags/$FORK_TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Check for an existing GitHub Release
        id: release
        env:
          FORK_TAG: ${{ steps.target.outputs.fork_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$FORK_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build OSC52 package and create Release
        if: steps.release.outputs.exists != 'true'
        env:
          FORK_TAG: ${{ steps.target.outputs.fork_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build-win-osc52.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$FORK_TAG"

          {
            echo ""
            echo "Created \`$FORK_TAG\` and dispatched the OSC52 Windows release build."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report existing Release
        if: steps.release.outputs.exists == 'true'
        run: |
          {
            echo ""
            echo "Release \`${{ steps.target.outputs.fork_tag }}\` already exists. No build was dispatched."
          } >> "$GITHUB_STEP_SUMMARY"
